<!-- 
  [MPA 공통 네비게이션 바 컴포넌트]
  - 이 코드를 복사하여 각 페이지(index.html, about.html, gallery.html, contact.html)의 <body> 시작 부분에 넣으세요.
  - 현재 머무르고 있는 페이지의 링크 태그 <a>에 'text-blue-600 font-semibold' 클래스를 부여하고, 
    나머지 링크에는 'text-slate-600 hover:text-blue-600' 클래스를 부여하여 '현재 페이지 활성화' 상태를 시각화합니다.
-->
<header class="fixed top-0 left-0 w-full bg-white/80 backdrop-blur-md border-b border-slate-100 z-50 transition-all duration-300">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
        <!-- 로고 (클릭 시 메인 홈으로 이동) -->
        <a href="index.html" class="text-lg font-extrabold tracking-tight text-blue-600 flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-blue-600 animate-pulse"></span>
            YERIN.M
        </a>
        
        <!-- 데스크톱 네비게이션 메뉴 (MPA 링크 구조) -->
        <nav class="hidden md:flex items-center gap-8 text-sm font-medium">
            <!-- 
              [Active State 적용 규칙]
              - index.html 에서는 '홈' 메뉴에 'text-blue-600 font-semibold' 지정
              - about.html 에서는 '소개' 메뉴에 'text-blue-600 font-semibold' 지정
              - gallery.html 에서는 '갤러리' 메뉴에 'text-blue-600 font-semibold' 지정
              - contact.html 에서는 '연락처' 메뉴에 'text-blue-600 font-semibold' 지정
            -->
            <a href="index.html" id="nav-home" class="transition-colors duration-200 text-slate-600 hover:text-blue-600">홈</a>
            <a href="about.html" id="nav-about" class="transition-colors duration-200 text-slate-600 hover:text-blue-600">소개</a>
            <a href="gallery.html" id="nav-gallery" class="transition-colors duration-200 text-slate-600 hover:text-blue-600">갤러리</a>
            <a href="contact.html" id="nav-contact" class="transition-colors duration-200 text-slate-600 hover:text-blue-600">연락처</a>
        </nav>
        
        <!-- 우측 액션 버튼 -->
        <div class="flex items-center gap-4">
            <a href="contact.html" class="text-xs md:text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-full transition-all duration-200">
                SSAFY 16기 합류하기
            </a>
            <!-- 모바일 메뉴 토글 버튼 -->
            <button id="mobile-menu-btn" class="md:hidden text-slate-600 hover:text-blue-600 focus:outline-none" aria-label="메뉴 열기">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
    </div>
    
    <!-- 모바일 드롭다운 메뉴 (기본값 숨김) -->
    <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-slate-100 px-6 py-4 space-y-3">
        <a href="index.html" class="block text-sm font-medium text-slate-600 hover:text-blue-600 py-1">홈</a>
        <a href="about.html" class="block text-sm font-medium text-slate-600 hover:text-blue-600 py-1">소개</a>
        <a href="gallery.html" class="block text-sm font-medium text-slate-600 hover:text-blue-600 py-1">갤러리</a>
        <a href="contact.html" class="block text-sm font-medium text-slate-600 hover:text-blue-600 py-1">연락처</a>
    </div>
</header>

<script>
    // [현재 페이지 활성화 스크립트]
    // 각 페이지의 파일명을 인식하여 해당하는 네비게이션 메뉴를 활성화 스타일로 변경합니다.
    document.addEventListener("DOMContentLoaded", function() {
        const path = window.location.pathname;
        const page = path.split("/").pop();
        
        // 엘리먼트 가져오기
        const navHome = document.getElementById("nav-home");
        const navAbout = document.getElementById("nav-about");
        const navGallery = document.getElementById("nav-gallery");
        const navContact = document.getElementById("nav-contact");
        
        const activeClasses = ["text-blue-600", "font-semibold"];
        const inactiveClasses = ["text-slate-600", "hover:text-blue-600"];
        
        function setActive(element) {
            if (element) {
                element.classList.remove(...inactiveClasses);
                element.classList.add(...activeClasses);
            }
        }
        
        // 경로 비교 후 활성화 지정
        if (page === "index.html" || page === "") {
            setActive(navHome);
        } else if (page === "about.html") {
            setActive(navAbout);
        } else if (page === "gallery.html") {
            setActive(navGallery);
        } else if (page === "contact.html") {
            setActive(navContact);
        }
        
        // 모바일 토글 이벤트
        const menuBtn = document.getElementById("mobile-menu-btn");
        const mobileMenu = document.getElementById("mobile-menu");
        if (menuBtn && mobileMenu) {
            menuBtn.addEventListener("click", () => {
                mobileMenu.classList.toggle("hidden");
            });
        }
    });
</script>
